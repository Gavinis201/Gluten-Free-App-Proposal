<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Proposal Access | Smith Dev</title>
  <meta name="description" content="Private proposal access for Smith Dev.">
  <script src="proposal-auth.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" type="image/png" sizes="32x32" href="./smithdev logo.png">
</head>
<body class="login-body">
  <header class="login-header">
    <a class="login-brand" href="login.html" aria-label="Smith Dev proposal access">
      <img src="smithdev logo.png" alt="">
      <span>Smith Dev</span>
    </a>
  </header>
  <main class="login-shell">
    <section class="login-card" aria-labelledby="login-title">
      <p class="eyebrow">Private Proposal</p>
      <h1 id="login-title">Proposal Access</h1>
      <p class="login-copy">Enter the access code to view the custom interactive website proposal.</p>

      <form class="login-form" data-login-form>
        <label for="access-code">Access Code</label>
        <div class="login-input-row">
          <div class="password-field">
            <input id="access-code" data-access-code type="password" autocomplete="current-password" maxlength="32" spellcheck="false" required>
            <button class="password-toggle" type="button" data-password-toggle aria-label="Show access code"><i class="fa-solid fa-eye" aria-hidden="true"></i></button>
          </div>
          <button type="submit">Enter</button>
        </div>
        <p class="login-message" data-login-message aria-live="polite"></p>
      </form>
    </section>
  </main>
</body>
</html>
